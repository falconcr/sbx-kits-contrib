schemaVersion: "1"
kind: mixin
name: claude-model-runner
version: "1.0.0"
extends: claude
displayName: Claude Code (Docker Model Runner)
description: Route Claude Code's Anthropic API calls to a local Docker Model Runner endpoint at host.docker.internal:12434.
sourceURL: https://github.com/docker/sbx-kits-contrib/tree/main/claude-model-runner

environment:
  variables:
    ANTHROPIC_BASE_URL: "http://host.docker.internal:12434"
    # Pin every Claude Code model alias to the same local model so the
    # default Sonnet/Opus/Haiku/sub-agent picks all hit Docker Model Runner.
    # Edit the anchored value below to switch models.
    ANTHROPIC_DEFAULT_OPUS_MODEL: &model "gpt-oss"
    ANTHROPIC_DEFAULT_SONNET_MODEL: *model
    ANTHROPIC_DEFAULT_HAIKU_MODEL: *model
    CLAUDE_CODE_SUBAGENT_MODEL: *model
