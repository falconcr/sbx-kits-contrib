schemaVersion: "1"
kind: agent
name: nanobot
version: "1.0.0"
displayName: Nanobot
description: "Lightweight personal AI assistant with multi-platform chat and multi-provider LLM support"
sourceURL: https://github.com/docker/sbx-kits-contrib/tree/main/nanobot

agent:
  image: "docker/sandbox-templates:shell-docker"
  aiFilename: AGENTS.md
  entrypoint:
    run: ["nanobot", "agent", "--config", "/home/agent/.nanobot/config.json"]

network:
  serviceDomains:
    api.anthropic.com: anthropic
    console.anthropic.com: anthropic
    claude.ai: anthropic
  serviceAuth:
    anthropic:
      headerName: x-api-key
      valueFormat: "%s"
  allowedDomains:
    - pypi.org
    - files.pythonhosted.org
    - "*.telegram.org"
    - "*.discord.com"
    - gateway.discord.gg
    - "*.whatsapp.com"
    - "*.whatsapp.net"
    - "*.slack.com"
    - "*.feishu.cn"

credentials:
  sources:
    anthropic:
      env:
        - ANTHROPIC_API_KEY

environment:
  variables:
    NANOBOT_AGENTS__DEFAULTS__WORKSPACE: /home/agent/nanobot
  proxyManaged:
    - ANTHROPIC_API_KEY

commands:
  install:
    - command: "pip install --break-system-packages nanobot-ai"
      user: "1000"
      description: Install nanobot
